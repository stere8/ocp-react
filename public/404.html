<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#081221" />
  <title>Page not found | Oracle Consults</title>
  <style>
    :root {
      color-scheme: light dark;
      --panel: rgba(15, 23, 42, 0.94);
      --border: rgba(148, 163, 184, 0.24);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --brand: #60a5fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Poppins, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 24%),
        linear-gradient(180deg, #07101e 0%, #081221 48%, #09101c 100%);
      color: var(--text);
    }

    main {
      width: min(100%, 720px);
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1.04;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
    }

    .primary {
      background: linear-gradient(135deg, #2f78ff, #1f5fd6);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }
  </style>
</head>
<body>
  <main>
    <span class="eyebrow">Oracle Consults</span>
    <h1>Page not found.</h1>
    <p>The page you requested is not available here. Return to the main site or open the contact page.</p>
    <div class="actions">
      <a class="primary" href="/">Go to homepage</a>
      <a class="secondary" href="/contact">Contact Oracle Consults</a>
    </div>
  </main>
</body>
</html>
